{% set name = "gcp-correction" %}
{% set version = "2.3.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/grimme-lab/gcp/archive/v{{ version }}.tar.gz
  sha256: f8bb203c5af57e942c3f02967d1970b2fdcfcd2bb8fc60b999c8b4226324a730
  patches:
    - wrap.patch

build:
  number: 2
  script:
    - set -ex  # [unix]
    - meson setup _build ${MESON_ARGS:---prefix=${PREFIX} --libdir=lib} -Ddefault_library=shared  # [unix]
    - meson setup _build --prefix=%PREFIX% --libdir=lib -D_default_library=shared --pkg-config-path=%PREFIX%\lib\pkgconfig  # [win]
    - meson compile -C _build
    - meson test -C _build --no-rebuild --print-errorlogs  # [build_platform == target_platform]
    - meson install -C _build --no-rebuild
  string: {{ module_abi }}_h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}
  run_exports:
    - {{ pin_subpackage(name, max_pin='x.x') }}

requirements:
  build:
    - {{ stdlib("c") }}  # [unix]
    - {{ stdlib("m2w64_c") }}  # [win]
    - {{ compiler('c') }}  # [osx]
    - {{ compiler('fortran') }}  # [unix]
    - {{ compiler('m2w64_fortran') }}  # [win]
    - meson
    - ninja
    - asciidoctor  # [unix]
    - llvm-openmp  # [osx]
  host:
    - libgomp  # [linux]
    - llvm-openmp  # [osx]
    - mctc-lib-devel * {{ module_abi }}_*

test:
  requires:
    - dftd3-python >=1.3.0  # checking co-installability
  commands:
    - mctc-gcp --version
    - pkg-config mctc-gcp --exact-version {{ version }}
    - test -f $PREFIX/lib/libmctc-gcp$SHLIB_EXT  # [unix]
    - test ! -f $PREFIX/lib/libmctc-gcp.a  # [unix]
    - if not exist %LIBRARY_BIN%\\libmctc-gcp-2.dll exit 1  # [win]


about:
  home: https://www.chemie.uni-bonn.de/pctc/mulliken-center/software/gcp
  license: LGPL-3.0-or-later
  license_family: LGPL
  license_file:
    - COPYING
    - COPYING.LESSER
  summary: Geometrical Counter-Poise Correction
  dev_url: https://github.com/grimme-lab/gcp

extra:
  recipe-maintainers:
    - awvwgk
